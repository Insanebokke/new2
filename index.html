═══════════════════════════════════════ */

const BTN_PURPLE     = '#5448EE';
const BTN_PURPLE_HOV = '#4338D4';

function PurpleBtn({ full = false, href = '#', children }) {
  const [hov, setHov] = React.useState(false);
  return (
    <a href={href}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display: full ? 'block' : 'inline-block',
        padding: '10px 20px',
        background: hov ? BTN_PURPLE_HOV : BTN_PURPLE,
        color: '#ffffff',
        borderRadius: '9999px',
        textAlign: 'center',
        fontWeight: 700,
        fontSize: '15px',
        lineHeight: '20px',
        textDecoration: 'none',
        marginBottom: full ? '10px' : 0,
        transition: 'background 0.15s ease',
        whiteSpace: 'nowrap',
      }}
    >{children}</a>
  );
}

function OutlineBtn({ full = false, onClick, children }) {
  const [hov, setHov] = React.useState(false);
  const style = {
    display: full ? 'block' : 'inline-block',
    padding: '9px 20px',
    background: hov ? '#f7f9f9' : '#ffffff',
    color: '#0f1419',
    borderRadius: '9999px',
    textAlign: 'center',
    fontWeight: 700,
    fontSize: '15px',
    lineHeight: '20px',
    textDecoration: 'none',
    border: '1px solid #cfd9de',
    transition: 'background 0.15s ease',
    whiteSpace: 'nowrap',
    cursor: 'pointer',
    width: full ? '100%' : undefined,
  };
  if (onClick) {
    return (
      <button onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={style}>
        {children}
      </button>
    );
  }
  return (
    <a href="#" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={style}>
      {children}
    </a>
  );
}

              <path d="M46.8002 15V4.5H17.7002V43.3H30.2002V15H46.8002Z" fill="#5448EE"/>
              <path d="M1 4.5H13V15H1V4.5Z" fill="#5448EE"/>
              <path d="M34.7998 32.7998H46.7998V43.2998H34.7998V32.7998Z" fill="#2FEECC"/>
            </svg>

            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', textAlign: 'center' }}>
              <h2 style={{ fontSize: '30px', fontWeight: 700, color: '#111827', margin: 0, lineHeight: '36px' }}>
                Continue the conversation
              </h2>
              <p style={{ fontSize: '15px', color: '#6b7280', margin: 0, lineHeight: '22px' }}>
                Sign up now to create your personalized experience.
              </p>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', width: '100%', maxWidth: '320px' }}>
              <PurpleBtn full>Create Account</PurpleBtn>
              <OutlineBtn full onClick={() => { onClose(); onSignIn(); }}>Sign In</OutlineBtn>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   SIGN IN MODAL
═══════════════════════════════════════ */

function SignInModal({ onClose }) {
  const [username, setUsername] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [showPw, setShowPw]     = React.useState(false);

  const inputStyle = {
    display: 'block', width: '100%',
    padding: '10px 12px',
    fontSize: '15px', color: '#111827',
    border: '2px solid #d1d5db',
    borderRadius: '6px',
    outline: 'none',
    fontFamily: 'inherit',
    transition: 'border-color 0.15s ease',
    boxSizing: 'border-box',
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 1002,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '16px',
    }}>
      {/* Backdrop */}
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0,
        background: 'rgba(107,114,128,0.85)',
        backdropFilter: 'blur(2px)',
      }} />

      {/* Dialog */}
      <div style={{
        position: 'relative', zIndex: 1,
        background: '#ffffff', borderRadius: '16px',
        width: '100%', maxWidth: '512px',
        boxShadow: '0 20px 60px rgba(0,0,0,0.2)',
        overflow: 'hidden',
      }}>
        <div style={{ padding: '24px 24px 28px 24px' }}>

          {/* Close button */}
          <button onClick={onClose} style={{
            background: 'transparent', border: 'none',
            cursor: 'pointer', padding: '6px',
            borderRadius: '9999px', color: '#111827',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            marginLeft: '-6px', marginBottom: '16px',
            transition: 'background 0.15s ease',
          }}
            onMouseEnter={e => e.currentTarget.style.background = '#f3f4f6'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
          >
            <IcoX />
          </button>

          {/* Title */}
          <h1 style={{ fontSize: '30px', fontWeight: 700, color: '#111827', margin: '0 0 4px 0', lineHeight: '36px' }}>
            Sign in
          </h1>
          <p style={{ fontSize: '15px', color: '#6b7280', margin: '0 0 24px 0', lineHeight: '22px' }}>
            Sign in to Truth Social with your username and password.
          </p>

          {/* Form */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
            {/* Username */}
            <input
              type="text" placeholder="Username" value={username}
              onChange={e => setUsername(e.target.value)}
              autoCapitalize="off" autoCorrect="off"
              style={inputStyle}
              onFocus={e => e.target.style.borderColor = '#5448EE'}
              onBlur={e => e.target.style.borderColor = '#d1d5db'}
            />

            {/* Password */}
            <div style={{ position: 'relative' }}>
              <input
                type={showPw ? 'text' : 'password'} placeholder="Password" value={password}
                onChange={e => setPassword(e.target.value)}
                autoComplete="off"
                style={{ ...inputStyle, paddingRight: '40px' }}
                onFocus={e => e.target.style.borderColor = '#5448EE'}
                onBlur={e => e.target.style.borderColor = '#d1d5db'}
              />
              <button
                type="button" onClick={() => setShowPw(p => !p)}
                tabIndex={-1}
                style={{
                  position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)',
                  background: 'transparent', border: 'none', cursor: 'pointer',
                  color: '#6b7280', display: 'flex', alignItems: 'center', padding: '2px',
                }}
              >
                {showPw ? <IcoEyeOff /> : <IcoEye />}
              </button>
            </div>

            {/* Sign In button */}
            <button style={{
              width: '100%', padding: '10px 16px',
              background: '#5448EE', color: '#ffffff',
              border: 'none', borderRadius: '9999px',
              fontSize: '14px', fontWeight: 600,
              cursor: 'pointer', marginTop: '4px',
              transition: 'background 0.15s ease',
            }}
              onMouseEnter={e => e.currentTarget.style.background = '#4338D4'}
              onMouseLeave={e => e.currentTarget.style.background = '#5448EE'}
            >
              Sign In
            </button>

            {/* Forgot */}
            <button style={{
              width: '100%', padding: '10px 16px',
              background: 'transparent', color: '#5448EE',
              border: 'none', borderRadius: '9999px',
              fontSize: '14px', fontWeight: 600,
              cursor: 'pointer',
              transition: 'background 0.15s ease',
            }}
              onMouseEnter={e => e.currentTarget.style.background = '#f3f4f6'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
              Forgot Username or Password?
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

const Sidebar = ({ onSignIn }) => (
  <div style={{ width: '300px', flexShrink: 0, padding: '12px 0 12px 20px' }}>
    <SidebarCard
      title="New to Truth?"
      description="Join Truth Social to get the full story and details."
    >
      <PurpleBtn full>Create Account</PurpleBtn>
      <OutlineBtn full onClick={onSignIn}>Sign In</OutlineBtn>
    </SidebarCard>

    <SidebarCard
      title="Get Truth+"
      description="Access the full experience with even more live and on-demand content."
    >
      <PurpleBtn href="https://truthsocial.com/">Subscribe</PurpleBtn>
    </SidebarCard>

    <div style={{ fontSize: '15px', color: '#6b7280', lineHeight: '20px', paddingLeft: '2px' }}>
      <div style={{ marginBottom: '2px' }}>
        <a href="https://help.truthsocial.com/?_gl=1*p8pngs*_gcl_au*MTQ4MTEwMDYwMi4xNzc4NDQwNTQ1" target="_blank" rel="noopener noreferrer" style={{ color: '#6b7280' }}
          onMouseEnter={e => e.currentTarget.style.textDecoration = 'underline'}
          onMouseLeave={e => e.currentTarget.style.textDecoration = 'none'}>
          Help Center
        </a>
        {' • '}
        <a href="https://help.truthsocial.com/legal/?_gl=1*p8pngs*_gcl_au*MTQ4MTEwMDYwMi4xNzc4NDQwNTQ1" target="_blank" rel="noopener noreferrer" style={{ color: '#6b7280' }}
          onMouseEnter={e => e.currentTarget.style.textDecoration = 'underline'}
          onMouseLeave={e => e.currentTarget.style.textDecoration = 'none'}>
          Legal
        </a>
      </div>
      <div>Proudly made in the United States of America. 🇺🇸</div>
    </div>
  </div>
);

/* ═══════════════════════════════════════
   FIXED BOTTOM BAR
═══════════════════════════════════════ */

const FooterSection = ({ onSignIn }) => (
  <div style={{
    position: 'fixed', bottom: 0, left: 0, right: 0,
    background: '#ffffff',
    borderTop: '1px solid #e5e7eb',
    zIndex: 50,
  }}>
    <div style={{
      maxWidth: '896px',
      margin: '0 auto',
      padding: '32px 16px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    }}>
      <div style={{ display: 'flex', flexDirection: 'column' }}>
        <p style={{
          fontWeight: 700, fontSize: '24px', color: '#111827',
          lineHeight: '32px', margin: 0,
        }}>
          Continue the conversation
        </p>
        <p style={{
          fontSize: '16px', fontWeight: 500, color: '#6b7280',
          lineHeight: '20px', margin: 0,
        }}>
          Sign up now to create your personalized experience.
        </p>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexShrink: 0 }}>
        <PurpleBtn>Create Account</PurpleBtn>
        <OutlineBtn onClick={onSignIn}>Sign In</OutlineBtn>
      </div>
    </div>
  </div>
);

/* ═══════════════════════════════════════
   ROOT APP
═══════════════════════════════════════ */

function App() {
  const [signInOpen,  setSignInOpen]  = React.useState(false);
  const [unAuthOpen,  setUnAuthOpen]  = React.useState(false);
  const openSignIn   = () => setSignInOpen(true);
  const closeSignIn  = () => setSignInOpen(false);
  const openUnAuth   = () => setUnAuthOpen(true);
  const closeUnAuth  = () => setUnAuthOpen(false);

  return (
    <div style={{
      minHeight: '100vh',
      background: '#ffffff',
      display: 'flex',
      justifyContent: 'center',
    }}>
      <div style={{
        display: 'flex',
        width: '100%',
        maxWidth: '1190px',
      }}>

        {/* Left nav */}
        <div style={{ width: '290px', flexShrink: 0 }}>
          <TruthLogo />
        </div>

        {/* Center feed */}
        <div style={{
          flex: '1 1 auto',
          maxWidth: '600px',
          minWidth: 0,
          borderLeft: '1px solid #eff3f4',
          borderRight: '1px solid #eff3f4',
          paddingBottom: '120px',
        }}>
          <Header />
          <PostCard onLikeClick={openUnAuth} />
        </div>

        {/* Right sidebar */}
        <Sidebar onSignIn={openSignIn} />
      </div>

      <FooterSection onSignIn={openSignIn} />

      {unAuthOpen && <UnauthorizedModal onClose={closeUnAuth} onSignIn={openSignIn} />}
      {signInOpen && <SignInModal onClose={closeSignIn} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
